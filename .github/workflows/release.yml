name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build integration archive
        run: |
          cd custom_components/waterguru_poolmath
          zip -r ../../waterguru_poolmath.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: waterguru_poolmath.zip
